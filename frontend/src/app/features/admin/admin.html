<header class="px-6 py-8 lg:px-10">
    <h1 class="text-3xl font-bold tracking-tight text-gray-900">Admin Page</h1>
</header>

<main class="min-h-screen bg-gray-50 px-6 lg:px-10">
    <section class="mb-10">
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">Users</h2>
        <app-admin-tabel [data]="users()" [columns]="userColumns"></app-admin-tabel>
    </section>
    <section>
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">Events</h2>
        <app-admin-tabel [data]="events()" [columns]="eventColumns"></app-admin-tabel>
    </section>
</main>
